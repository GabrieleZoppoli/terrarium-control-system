baseURL = "https://highlandcloudforest.com/"
title = "Highland Cloud Forest · Gabriele Zoppoli"
theme = "blowfish"

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

# Rewrite root-relative URLs (/img/..., /collection/..., etc.) in rendered
# HTML so they resolve correctly on the /terrarium-control-system/ subdirectory
# deploy. Without this, raw HTML <img src="/img/X"> in markdown 404s.
canonifyURLs = true

enableRobotsTXT = true
enableEmoji = false

[languages]
  [languages.en]
    languageCode  = "en"
    languageName  = "English"
    weight        = 1
    title         = "Highland Cloud Forest · Gabriele Zoppoli"
    description   = "An open-source weather-mimicking cloud-forest terrarium, a living botanical collection organised as a phylogenetic tree, and a small set of carnivorous-plant inventions. By Gabriele Zoppoli, Genova."
    [languages.en.params]
      shortTitle = "Highland Cloud Forest"
      tagline    = "Gabriele Zoppoli · Genova"
      heroLede   = "A highland cloud-forest terrarium cooled by a marine compressor and orchestrated by Node-RED, the standalone inventions built around it, and the wider plant collection — documented end to end."
      keywords   = ["cloud forest terrarium", "Heliamphora", "Dracula orchid", "Nepenthes", "Tillandsia", "highland orchid", "carnivorous plants", "phylogenetic dendrogram", "Node-RED", "marine compressor cooling", "Genova"]

  [languages.it]
    languageCode  = "it"
    languageName  = "Italiano"
    weight        = 2
    title         = "Foresta Nebulosa · Gabriele Zoppoli"
    description   = "Un terrario open-source che riproduce il clima delle foreste nebulose di alta quota, una collezione botanica vivente ordinata come albero filogenetico, e un piccolo catalogo di invenzioni dedicate alle piante carnivore. Di Gabriele Zoppoli, Genova."
    [languages.it.params]
      shortTitle = "Foresta Nebulosa"
      tagline    = "Gabriele Zoppoli · Genova"
      heroLede   = "Un terrario che riproduce il clima di una foresta nebulosa d'alta quota — raffreddato da un compressore marino, orchestrato con Node-RED — le invenzioni che ci sono nate intorno, e la più ampia collezione di piante. Tutto documentato, dall'inizio alla fine."
      keywords   = ["terrario cloud forest", "Heliamphora", "Dracula", "Nepenthes", "Tillandsia", "orchidee d'alta quota", "piante carnivore", "dendrogramma filogenetico", "Node-RED", "compressore marino", "Genova"]

[params]
  colorScheme = "ocean"
  defaultAppearance = "dark"
  autoSwitchAppearance = false
  enableSearch = true
  enableCodeCopy = true
  # Read-only terrarium conditions JSON served via Tailscale Funnel (CORS *, refresh >=60s).
  # Returns { temperature_c, humidity_rh, vpd_kpa, compressor, updatedAt }. Empty string disables the live block.
  liveConditionsURL = "https://rei1.tail7cc014.ts.net/api/conditions.json"
  # Default OG card used site-wide; individual pages may override via .Params.ogImage.
  ogImage = "img/og/og-default.jpg"
  repoURL = "https://github.com/GabrieleZoppoli/terrarium-control-system"
  twitter = ""

  [params.homepage]
    layout = "background"
    homepageImage = "img/hero.jpg"
    showRecent = true
    recentLimit = 5
    # Curated featured-photo mosaic on the homepage. Each entry renders as a tile
    # linking to the matching genus page. Paths are relative to static/.
    featuredMosaic = [
      { src = "img/collection/heliamphora/heliamphora-macdonaldae.jpg", alt = "Heliamphora macdonaldae", taxon = "Heliamphora macdonaldae", tepui = "Venezuelan tepuis", href = "/collection/genera/heliamphora/" },
      { src = "img/collection/dracula/dracula-pholeodytes.jpg", alt = "Dracula pholeodytes", taxon = "Dracula pholeodytes", tepui = "Colombian Andes", href = "/collection/genera/dracula/" },
      { src = "img/collection/nepenthes/nepenthes-argentii.jpg", alt = "Nepenthes argentii", taxon = "Nepenthes argentii", tepui = "Mindanao, 2,300 m", href = "/collection/genera/nepenthes/" },
      { src = "img/collection/sophronitis/sophronitis-coccinea-4n.jpg", alt = "Sophronitis coccinea 4N", taxon = "Sophronitis coccinea 4N", tepui = "Brazilian campos rupestres", href = "/collection/genera/sophronitis/" },
      { src = "img/collection/nepenthes/nepenthes-jamban.jpg", alt = "Nepenthes jamban pitcher", taxon = "Nepenthes jamban", tepui = "Sumatra · 'toilet pitcher' endemic", href = "/collection/genera/nepenthes/" },
      { src = "img/collection/dendrobium/dendrobium-cuthbertsonii-yellow.jpg", alt = "Dendrobium cuthbertsonii yellow", taxon = "Dendrobium cuthbertsonii 'Yellow'", tepui = "New Guinea highlands", href = "/collection/genera/dendrobium/" },
      { src = "img/collection/masdevallia/masdevallia-decumana.jpg", alt = "Masdevallia decumana", taxon = "Masdevallia decumana", tepui = "Andean cloud forest", href = "/collection/genera/other-orchids/" },
      { src = "img/collection/utricularia/utricularia-alpina.jpg", alt = "Utricularia alpina", taxon = "Utricularia alpina", tepui = "Guayana highlands, epiphyte", href = "/collection/genera/other-genera/" },
      { src = "img/collection/comparettia/comparettia-falcata.jpg", alt = "Comparettia falcata", taxon = "Comparettia falcata", tepui = "Neotropical epiphyte", href = "/collection/genera/other-orchids/" },
      { src = "img/collection/heliamphora/heliamphora-ionasi-elegance.jpg", alt = "Heliamphora ionasi Elegance", taxon = "Heliamphora ionasi 'Elegance'", tepui = "Ilu-Tepui, Venezuela", href = "/collection/genera/heliamphora/" },
    ]
    # Species kept outside the highland cabinet (outdoor bed / balcony / aquatic)
    featuredMosaicOutdoor = [
      { src = "img/collection/sarracenia/sarracenia-hurricane-creek-white-clone-f.jpg", alt = "Sarracenia Hurricane Creek White", taxon = "Sarracenia 'Hurricane Creek White'", tepui = "Gulf-coast hybrid · outdoor bed", href = "/collection/genera/sarracenia/" },
      { src = "img/collection/sarracenia/sarracenia-x-moorei-leah-wilkerson-5.jpg", alt = "Sarracenia moorei Leah Wilkerson on the balcony at night", taxon = "Sarracenia × moorei 'Leah Wilkerson'", tepui = "Outdoor bed · balcony, Genova", href = "/collection/genera/sarracenia/" },
      { src = "img/collection/dionaea/dionaea-muscipula-alien.jpg", alt = "Dionaea muscipula Alien", taxon = "Dionaea muscipula 'Alien'", tepui = "Carolina bog · outdoor bed", href = "/collection/genera/dionaea/" },
      { src = "img/collection/dionaea/dionaea-muscipula-dracula.jpg", alt = "Dionaea muscipula Dracula", taxon = "Dionaea muscipula 'Dracula'", tepui = "Red-throated cultivar · outdoor bed", href = "/collection/genera/dionaea/" },
      { src = "img/collection/aldrovanda/aldrovanda-vesiculosa.jpg", alt = "Aldrovanda vesiculosa", taxon = "Aldrovanda vesiculosa", tepui = "Aquatic carnivore · outdoor bowl", href = "/collection/genera/outdoor/" },
      { src = "img/collection/nymphaea/nymphaea-pygmaea-helvola.jpg", alt = "Nymphaea pygmaea Helvola", taxon = "Nymphaea pygmaea 'Helvola'", tepui = "Miniature water lily · outdoor pond", href = "/collection/genera/outdoor/" },
    ]

  [params.article]
    showDate = true
    showReadingTime = true
    showTableOfContents = true

  [params.header]
    layout = "basic"

  [params.footer]
    showCopyright = true
    showThemeAttribution = true

  [params.author]
    name = "Gabriele Zoppoli"
    headline = "Physician scientist · highland cloud-forest grower"
    bio = "MD, PhD. Associate Professor of Internal Medicine at the University of Genoa and consultant at IRCCS Ospedale Policlinico San Martino. Outside the hospital: a 380+ accession living collection of carnivorous plants, miniature orchids, and Tillandsia — the cloud-forest species under an open-source highland terrarium, the rest on the balcony and on passive-mist shelves indoors."
    image = "img/author.jpg"
    orcid = "https://orcid.org/0000-0002-1619-1708"
    email = "gabriele.zoppoli@unige.it"
    instagram = "https://www.instagram.com/zoppolig"
    sameAs = [
      "https://orcid.org/0000-0002-1619-1708",
      "https://scholar.google.com/citations?user=Q5DfyqQAAAAJ",
      "https://github.com/GabrieleZoppoli",
      "https://www.linkedin.com/in/gabriele-zoppoli",
      "https://www.researchgate.net/profile/Gabriele-Zoppoli",
      "https://www.instagram.com/zoppolig",
    ]
    links = [
      { email = "mailto:gabriele.zoppoli@unige.it" },
      { github = "https://github.com/GabrieleZoppoli/terrarium-control-system" },
      { orcid = "https://orcid.org/0000-0002-1619-1708" },
      { "google-scholar" = "https://scholar.google.com/citations?user=Q5DfyqQAAAAJ" },
      { linkedin = "https://www.linkedin.com/in/gabriele-zoppoli" },
      { researchgate = "https://www.researchgate.net/profile/Gabriele-Zoppoli" },
      { instagram = "https://www.instagram.com/zoppolig" },
    ]

[taxonomies]
  tag = "tags"
  category = "categories"
  genus = "genera"

