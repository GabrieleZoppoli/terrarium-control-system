{{- /* Universal back-to-top button. Rendered on every page except the
       home (the home has its own jump-nav pill that already includes a
       back-to-top arrow). Hidden until the reader scrolls past ~400 px. */ -}}
<a href="#top" class="back-to-top" aria-label="{{ i18n "back_to_top" }}" hidden>↑</a>
<script>
  (function () {
    var btn = document.querySelector('.back-to-top');
    if (!btn) return;
    var threshold = 400;
    function onScroll() {
      var show = window.scrollY > threshold;
      btn.hidden = !show;
      btn.classList.toggle('is-visible', show);
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    btn.addEventListener('click', function (e) {
      e.preventDefault();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    onScroll();
  })();
</script>
