# Provenance / origin captions for homepage mosaic pool entries.
# Read by scripts/generate_mosaic_pools.py; used as the tile's bottom
# caption (short phrase, ≤10 words) when a pool entry is rotated in.
#
# Lookup precedence for a given taxon string:
#   1. exact-match key (allows clone / cultivar-specific wording)
#   2. "Genus species" prefix match (first 2 whitespace tokens)
#   3. fallback to a generic location label ("Highland cabinet",
#      "Balcony · outdoor") — set in the Python script.
#
# Keep phrases concise (3–10 words). Geographic + one distinguishing
# habitat / elevation / noteworthy fact where room allows. Match the
# style of the curated hugo.toml featuredMosaic entries.

