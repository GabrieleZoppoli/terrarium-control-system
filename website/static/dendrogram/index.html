<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Living Collection — Phylogenetic Dendrogram</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: radial-gradient(ellipse at center, #111318 0%, #090a0d 50%, #050607 100%);
    color: #e0e0e0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    overflow: hidden; user-select: none;
  }
  #chart { width: 100vw; height: 100vh; cursor: grab; }
  #chart:active { cursor: grabbing; }

  .link {
    fill: none; stroke-opacity: 0.8; stroke-width: 1.5px;
    transition: stroke-opacity 0.4s ease, stroke-width 0.4s ease;
  }
  .link.highlighted { stroke-opacity: 0.95; stroke-width: 1.8px; }
  .link.dimmed { stroke-opacity: 0.18; }

  .node circle {
    transition: r 0.35s ease, fill-opacity 0.35s ease, filter 0.35s ease;
    cursor: pointer;
  }
  .node:hover circle { filter: drop-shadow(0 0 3px currentColor); }
  .node text { transition: fill-opacity 0.35s ease, opacity 0.35s ease; pointer-events: none; }
  .branch-label { pointer-events: auto; cursor: pointer; }

  /* ── Progressive label disclosure ── */
  /* Order labels: faint at rest, visible on zoom or interaction */
  .branch-label-order { opacity: 1; transition: opacity 0.3s ease; }
  /* Family labels: subtle at rest */
  .branch-label-family { opacity: 1; transition: opacity 0.3s ease; }
  /* Genus labels: clearly visible */
  .branch-label-genus { opacity: 1; transition: opacity 0.3s ease; }
  /* All branch labels brighten on hover/focus */
  .node:hover .branch-label, .node.show-label .branch-label { opacity: 1; }

  /* Leaf labels: hidden at rest, shown on hover/focus/zoom */
  .leaf-label { opacity: 1; transition: opacity 0.3s ease; }
  .node:hover .leaf-label { opacity: 1; }
  .node.show-label .leaf-label { opacity: 1; }
  /* Zoom-triggered: at genus-level zoom, all visible leaves show labels */
  body.zoom-leaves .leaf-label { opacity: 0.75; }
  body.zoom-leaves .node:hover .leaf-label { opacity: 1; }
  body.zoom-leaves .node.show-label .leaf-label { opacity: 1; }
  /* At deep zoom, family/order labels also fully visible */
  body.zoom-branches .branch-label-order,
  body.zoom-branches .branch-label-family { opacity: 0.7; }

  .node.dimmed circle { fill-opacity: 0.3; stroke-opacity: 0.3; }
  .node.dimmed text { fill-opacity: 0.25; opacity: 0.25 !important; }
  .node.dimmed .status-icon { opacity: 0.25 !important; }

  .status-icon { font-size: 10px; pointer-events: none; opacity: 0.5; }

  /* ── Title ── */
  #title {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    text-align: center; z-index: 10; pointer-events: none;
  }
  #title h1 {
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 22px; font-weight: 300; letter-spacing: 4px;
    text-transform: uppercase; color: #c8c8c8;
    text-shadow: 0 0 40px rgba(120,120,120,0.15);
  }
  #title .sub {
    font-size: 11px; color: #555; margin-top: 4px; letter-spacing: 1.2px;
    font-weight: 300;
  }

  /* ── Search ── */
  #search-box {
    position: fixed; top: 18px; right: 20px; z-index: 20;
    display: flex; align-items: center; gap: 8px;
  }
  #search {
    background: rgba(20,22,28,0.85); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px; padding: 8px 16px; color: #ddd; font-size: 13px;
    width: 230px; outline: none; backdrop-filter: blur(12px);
    font-family: 'Inter', sans-serif; font-weight: 300;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  #search:focus {
    border-color: rgba(142,36,170,0.5);
    box-shadow: 0 0 20px rgba(142,36,170,0.1);
  }
  #search::placeholder { color: #444; }
  #search-count { font-size: 11px; color: #666; font-weight: 300; }

  /* ── Breadcrumb ── */
  #breadcrumb {
    position: fixed; top: 68px; left: 50%; transform: translateX(-50%);
    z-index: 10; font-size: 11px; color: #555; display: flex;
    gap: 4px; align-items: center; font-weight: 300;
  }
  #breadcrumb span { cursor: pointer; transition: color 0.2s; }
  #breadcrumb span:hover { color: #eee; }
  #breadcrumb .sep { color: #333; cursor: default; }

  /* ── Info Panel ── */
  #info {
    position: fixed; bottom: 20px; right: 20px; z-index: 20;
    background: rgba(14,16,20,0.92);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px; padding: 20px 24px; width: 320px;
    display: none; backdrop-filter: blur(16px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  #info .close {
    position: absolute; top: 10px; right: 14px; cursor: pointer;
    color: #555; font-size: 18px; transition: color 0.2s;
  }
  #info .close:hover { color: #eee; }
  #info .taxon {
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 18px; font-weight: 400; margin-bottom: 2px;
  }
  #info .rank {
    font-size: 9px; text-transform: uppercase; letter-spacing: 2px;
    color: #666; margin-bottom: 10px; font-weight: 500;
  }
  #info .detail {
    font-size: 12px; color: #888; margin: 4px 0; font-weight: 300;
    line-height: 1.5;
  }
  #info .detail b { color: #aaa; font-weight: 500; }

  /* Photo slideshow in info panel */
  #info-photos {
    margin-top: 12px; display: none;
  }
  #info-photos .slideshow {
    position: relative; width: 100%; overflow: hidden; border-radius: 8px;
    cursor: pointer;
  }
  #info-photos .slideshow img {
    width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px;
    display: block; transition: opacity 0.5s ease;
  }
  #info-photos .slideshow img.slide-hidden { display: none; }
  #info-photos .slideshow:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  #info-photos .slide-dots {
    display: flex; justify-content: center; gap: 5px; margin-top: 8px;
  }
  #info-photos .slide-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #444;
    cursor: pointer; transition: background 0.25s;
  }
  #info-photos .slide-dot.active { background: #bbb; }
  #info-photos .photo-hint {
    font-size: 10px; color: #555; margin-top: 6px;
    text-align: center; font-weight: 300;
  }
  .has-photo-indicator {
    font-size: 9px; fill: #FFD54F; pointer-events: none; opacity: 0.7;
  }

  /* Lightbox */
  #lightbox {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.92); display: none;
    justify-content: center; align-items: center;
    backdrop-filter: blur(8px);
  }
  #lightbox img {
    max-width: 85vw; max-height: 85vh; border-radius: 8px;
    box-shadow: 0 16px 64px rgba(0,0,0,0.6);
    cursor: default;
  }
  #lightbox .lb-close {
    position: absolute; top: 24px; right: 32px;
    font-size: 28px; color: #888; cursor: pointer;
    transition: color 0.2s; z-index: 102;
  }
  #lightbox .lb-close:hover { color: #fff; }
  #lightbox .lb-arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    font-size: 36px; color: #888; cursor: pointer;
    transition: color 0.2s; z-index: 102; user-select: none;
    padding: 16px;
  }
  #lightbox .lb-arrow:hover { color: #fff; }
  #lightbox .lb-prev { left: 16px; }
  #lightbox .lb-next { right: 16px; }
  #lightbox .lb-counter {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    font-size: 12px; color: #666; font-weight: 300; letter-spacing: 1px;
  }
  #lightbox .lb-bg {
    position: absolute; inset: 0; cursor: zoom-out;
  }

  #info .children-list {
    margin-top: 10px; max-height: 200px; overflow-y: auto;
  }
  #info .children-list .child {
    font-size: 11px; color: #777; padding: 3px 0; cursor: pointer;
    transition: color 0.2s; font-weight: 300;
  }
  #info .children-list .child:hover { color: #eee; }
  #info .children-list::-webkit-scrollbar { width: 3px; }
  #info .children-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  /* ── Legend ── */
  #legend {
    position: fixed; bottom: 20px; left: 20px; z-index: 20;
    background: rgba(14,16,20,0.92);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px; padding: 14px 18px;
    backdrop-filter: blur(16px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  #legend .section-title {
    font-size: 9px; text-transform: uppercase; letter-spacing: 2px;
    color: #444; margin: 10px 0 5px; font-weight: 500;
  }
  #legend .section-title:first-child { margin-top: 0; }
  .legend-item {
    display: flex; align-items: center; margin: 3px 0; font-size: 11px;
    color: #888; cursor: pointer; transition: color 0.2s; font-weight: 300;
  }
  .legend-item:hover { color: #eee; }
  .legend-item.muted { opacity: 0.15; }
  .legend-swatch {
    width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; flex-shrink: 0;
  }
  .legend-symbol { margin-right: 6px; font-size: 12px; min-width: 16px; text-align: center; }

  /* ── Controls hint ── */
  #controls {
    position: fixed; top: 68px; right: 20px; z-index: 10;
    font-size: 10px; color: #333; text-align: right; line-height: 1.7;
    font-weight: 300;
  }


  /* ── Subtle vignette overlay ── */
  #vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.4) 100%);
  }

  /* ── Text outline replaces removed #text-halo filter ── */
  .branch-label, .leaf-label {
    paint-order: stroke;
    stroke: #090a0d;
    stroke-width: 3px;
    stroke-linejoin: round;
    stroke-opacity: 0.92;
  }
/* Hover photo preview */
#hover-preview {
  position: fixed;
  display: none;
  pointer-events: none;
  z-index: 40;
  background: rgba(15, 16, 20, 0.92);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 6px;
  padding: 8px 8px 10px;
  max-width: 276px;
  box-shadow: 0 6px 24px rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
#hover-preview.visible { display: block; }
#hover-preview .hover-preview-caption {
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #c8c8c8;
  margin-bottom: 6px;
  padding: 0 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#hover-preview .hover-preview-caption.leaf {
  font-style: italic;
  text-transform: none;
  letter-spacing: normal;
  font-size: 11px;
  color: #ddd;
}
#hover-preview .hover-preview-grid {
  display: grid;
  grid-auto-rows: 80px;
  gap: 4px;
}
#hover-preview .hover-preview-grid img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 3px;
  background: #111;
  display: block;
}
</style>
</head>

<div id="vignette"></div>

<div id="title">
  <div class="sub">385 accessions · 89 genera · 25 families</div>
</div>

<div id="breadcrumb"></div>


<div id="search-box">
  <input id="search" type="text" placeholder="Search plants..." autocomplete="off" />
  <span id="search-count"></span>
</div>

<div id="controls">
  scroll to zoom &middot; drag to pan<br>
  click node to focus &middot; click center to reset<br>
  Esc to clear
</div>

<div id="chart"></div>

<div id="info">
  <div class="close" onclick="closeInfo()">&times;</div>
  <div class="rank" id="info-rank"></div>
  <div class="taxon" id="info-taxon"></div>
  <div id="info-details"></div>
  <div id="info-photos">
    <div class="slideshow" id="slideshow"></div>
    <div class="slide-dots" id="slide-dots"></div>
    <div class="photo-hint">Click photo to enlarge</div>
  </div>
  <div class="children-list" id="info-children"></div>
</div>

<div id="hover-preview" aria-hidden="true">
  <div class="hover-preview-caption"></div>
  <div class="hover-preview-grid"></div>
</div>

<div id="lightbox">
  <div class="lb-bg" onclick="closeLightbox()"></div>
  <div class="lb-close" onclick="closeLightbox()">&times;</div>
  <div class="lb-arrow lb-prev" onclick="lbNav(-1, event)">&#x2039;</div>
  <img id="lightbox-img" src="" alt="" />
  <div class="lb-arrow lb-next" onclick="lbNav(1, event)">&#x203A;</div>
  <div class="lb-counter" id="lb-counter"></div>
</div>

<div id="legend">
  <div class="section-title">Evolutionary Groups</div>
  <div id="legend-items"></div>
  <div class="section-title" style="margin-top:14px">Status</div>
  <div style="display:flex;flex-direction:column;gap:3px">
    <div style="font-size:11px;color:#888;display:flex;align-items:center;font-weight:300"><span class="legend-symbol" style="color:#4CAF50">&#x25CF;</span> Alive</div>
    <div style="font-size:11px;color:#888;display:flex;align-items:center;font-weight:300"><span class="legend-symbol" style="color:#C62828">&#x271D;</span> Dead</div>
    <div style="font-size:11px;color:#888;display:flex;align-items:center;font-weight:300"><span class="legend-symbol" style="color:#7E57C2">&#x1F381;</span> Gave away</div>
    <div style="font-size:11px;color:#888;display:flex;align-items:center;font-weight:300"><span class="legend-symbol" style="color:#FFD54F">&#x25C6;</span> Has photo</div>
  </div>
</div>

const cladeColors = {
  "Algae": "#607D8B", "Bryophytes": "#8D6E63", "Ferns": "#66BB6A",
  "Gymnosperms": "#2E7D32", "Basal Angiosperms": "#5C6BC0",
  "Monocots": "#AB47BC", "Eudicots": "#EF5350", "Unknown": "#9E9E9E"
};
const orderColorsMap = {
  "Poales": "#00897B", "Asparagales": "#AB47BC", "Alismatales": "#26A69A",
  "Caryophyllales": "#EF5350", "Ericales": "#FF8F00", "Lamiales": "#42A5F5",
  "Oxalidales": "#43A047", "Rosales": "#EC407A"
};

let width = window.innerWidth;
let height = window.innerHeight;
const radius = Math.min(width, height) * 0.8 - 60;

let activeStatuses = new Set(['alive', 'dead', 'gave']);
let focusedNode = null;
let searchTerm = '';
let initialFitTransform = null;

const svg = d3.select("#chart").append("svg").attr("width", width).attr("height", height);
const g = svg.append("g").attr("transform", `translate(${width/2},${height/2})`);

// Invisible background to capture pointer events in the "area" between nodes.
// Must be FIRST child of g so it sits behind nodes and links in render order.
// Large negative-offset bounds comfortably cover the radial layout at any zoom.
const proximityOverlay = g.append("rect")
  .attr("class", "proximity-overlay")
  .attr("x", -2000).attr("y", -2000)
  .attr("width", 4000).attr("height", 4000)
  .attr("fill", "transparent")
  .style("cursor", "crosshair")
  .style("pointer-events", "all");

let currentZoom = 1;
const zoomBehavior = d3.zoom().scaleExtent([0.2, 14])
  .on("zoom", (e) => {
    g.attr("transform",
      `translate(${e.transform.x+width/2},${e.transform.y+height/2}) scale(${e.transform.k})`);
    // Progressive label disclosure based on zoom level
    const k = e.transform.k;
    if (k !== currentZoom) {
      currentZoom = k;
      document.body.classList.toggle('zoom-branches', k >= 1.8);
      document.body.classList.toggle('zoom-leaves', k >= 3);
    }
  });
svg.call(zoomBehavior);
// Disable d3-zoom's default double-click-to-zoom; we use dblclick for zoom-to-subtree instead.
svg.on("dblclick.zoom", null);

const cluster = d3.cluster().size([360, radius])
  .separation((a, b) => {
    if (a.parent == b.parent) return 1;
    // More space between different families/orders
    if (a.depth <= 2) return 3;
    return 2 / a.depth;
  });

const root = d3.hierarchy(data);
cluster(root);

// ── Helpers ──
function getClade(d) { let n=d; while(n.depth>1)n=n.parent; return n?n.data.name:'Unknown'; }
function getOrder(d) { let n=d; while(n.depth>2)n=n.parent; return n?n.data.name:''; }
function getColor(d) { const o=getOrder(d); return orderColorsMap[o]||cladeColors[getClade(d)]||'#555'; }
function getAncestors(d) { const p=[]; let c=d; while(c){p.push(c);c=c.parent;} return p; }
function getDescendants(d) { const desc=[]; function r(n){desc.push(n);if(n.children)n.children.forEach(r);} r(d); return desc; }
function leafCount(d) { if(!d.children)return 1; return d.children.reduce((s,c)=>s+leafCount(c),0); }

// Collect up to `max` representative photo paths for the hover preview.
// - For a leaf: that leaf's own photos, truncated to max.
// - For an internal node: DFS in JSON order, taking photo[0] from each photo'd descendant leaf, stopping at max.
function collectPreviewPhotos(d, max) {
  if (!d.children) {
    return (d.data.photos || []).slice(0, max);
  }
  const out = [];
  function walk(n) {
    if (out.length >= max) return;
    if (!n.children) {
      const p = n.data.photos;
      if (p && p.length > 0) out.push(p[0]);
      return;
    }
    for (const c of n.children) {
      if (out.length >= max) break;
      walk(c);
    }
  }
  walk(d);
  return out;
}

function radialLink(d) {
  const sa=(d.source.x-90)*Math.PI/180, sr=d.source.y;
  const ta=(d.target.x-90)*Math.PI/180, tr=d.target.y;
  return `M${sr*Math.cos(sa)},${sr*Math.sin(sa)}C${(sr+tr)/2*Math.cos(sa)},${(sr+tr)/2*Math.sin(sa)} ${(sr+tr)/2*Math.cos(ta)},${(sr+tr)/2*Math.sin(ta)} ${tr*Math.cos(ta)},${tr*Math.sin(ta)}`;
}
function radialPoint(x,y) { const a=(x-90)*Math.PI/180; return [y*Math.cos(a),y*Math.sin(a)]; }
function rankName(depth) { return ['Collection','Clade','Order','Family','Genus','Species'][depth]||''; }

// Proximity index: map any cursor coordinate (in g-space) to the nearest
// internal node at depth 2–4 (orders, families, genera). Species leaves are
// excluded — their small circles already handle precise hover/click.
const proximityCandidates = root.descendants().filter(n => n.depth >= 2 && n.depth <= 4);
const proximityPoints = proximityCandidates.map(n => radialPoint(n.x, n.y));
const proximityDelaunay = d3.Delaunay.from(proximityPoints);

// ── Draw links ──
const linkGroup = g.append("g");
const links = linkGroup.selectAll(".link").data(root.links()).join("path")
  .attr("class","link").attr("d",radialLink).attr("stroke",d=>getColor(d.target));

// ── Hover photo preview ──
const HOVER_DELAY_MS = 200;
const HOVER_MAX_PHOTOS = 6;
const hoverPreviewEl = document.getElementById('hover-preview');
const hoverPreviewCaptionEl = hoverPreviewEl.querySelector('.hover-preview-caption');
const hoverPreviewGridEl = hoverPreviewEl.querySelector('.hover-preview-grid');
let hoverPreviewTimer = null;
let hoverPreviewVisible = false;

function schedulePreview(event, d) {
  clearTimeout(hoverPreviewTimer);
  if (focusedNode) return;
  if (d.depth < 2) return;
  const x = event.clientX, y = event.clientY;
  hoverPreviewTimer = setTimeout(() => renderHoverPreview(d, x, y), HOVER_DELAY_MS);
}

function pickPreviewTier(n) {
  // Given raw photo-count n, return {cols, max} of the grid that fills cleanly.
  if (n >= 6) return { cols: 3, max: 6 };
  if (n >= 4) return { cols: 2, max: 4 };
  if (n >= 2) return { cols: 2, max: 2 };
  return { cols: 1, max: 1 };
}

function renderHoverPreview(d, x, y) {
  const raw = collectPreviewPhotos(d, HOVER_MAX_PHOTOS);
  if (raw.length === 0) { hideHoverPreview(); return; }
  const { cols, max } = pickPreviewTier(raw.length);
  const photos = raw.slice(0, max);
  hoverPreviewCaptionEl.textContent = d.data.name;
  hoverPreviewCaptionEl.classList.toggle('leaf', !d.children);
  hoverPreviewGridEl.style.gridTemplateColumns = `repeat(${cols}, 80px)`;
  hoverPreviewGridEl.innerHTML = photos
    .map(p => `<img src="${p}" alt="" onerror="this.style.visibility='hidden'" />`)
    .join('');
  hoverPreviewEl.classList.add('visible');
  hoverPreviewVisible = true;
  positionHoverPreview(x, y);
}

function positionHoverPreview(x, y) {
  const rect = hoverPreviewEl.getBoundingClientRect();
  const vw = window.innerWidth, vh = window.innerHeight;
  const offset = 16;
  let left = x + offset, top = y + offset;
  if (left + rect.width > vw - 8) left = x - offset - rect.width;
  if (top + rect.height > vh - 8) top = y - offset - rect.height;
  if (left < 8) left = 8;
  if (top < 8) top = 8;
  hoverPreviewEl.style.left = `${left}px`;
  hoverPreviewEl.style.top = `${top}px`;
}

function clearHoverPreview() {
  clearTimeout(hoverPreviewTimer);
  hideHoverPreview();
}

function hideHoverPreview() {
  hoverPreviewEl.classList.remove('visible');
  hoverPreviewVisible = false;
  hoverPreviewGridEl.innerHTML = '';
}

// ── Draw nodes ──
const nodeGroup = g.append("g");
const nodes = nodeGroup.selectAll(".node").data(root.descendants()).join("g")
  .attr("class","node")
  .attr("transform",d=>`rotate(${d.x-90}) translate(${d.y},0)`)
  .on("click",(e,d)=>{e.stopPropagation();onNodeClick(d);})
  .on("dblclick",(e,d)=>{ e.stopPropagation(); e.preventDefault(); onNodeClick(d); if (d.depth>=2 && d.depth<=4) zoomToSubtree(d); })
  .on("mouseover",(e,d)=>{ onNodeHover(d); schedulePreview(e, d); })
  .on("mousemove",(e)=>{ if (hoverPreviewVisible) positionHoverPreview(e.clientX, e.clientY); })
  .on("mouseout",()=>{ clearHighlight(); clearHoverPreview(); });

// Proximity event handlers — resolve cursor to nearest internal node
// and dispatch to the existing hover/click machinery.
// Key UX invariants:
//  - onNodeHover/schedulePreview only fire when the candidate CHANGES, not per pixel
//    (otherwise the subtree dim/highlight re-applies on every mousemove and the tree flickers)
//  - if the nearest candidate is too far from the cursor (dead center of the tree), do nothing
const PROX_MAX_DIST_SQ = 180 * 180;  // g-space pixels; beyond this, not close enough to trigger
let lastProximityCandidate = null;

function resolveProximity(event) {
  const [mx, my] = d3.pointer(event, g.node());
  const idx = proximityDelaunay.find(mx, my);
  const candidate = proximityCandidates[idx];
  if (!candidate) return null;
  const [cx, cy] = proximityPoints[idx];
  const dx = mx - cx, dy = my - cy;
  if (dx * dx + dy * dy > PROX_MAX_DIST_SQ) return null;
  return candidate;
}

proximityOverlay
  .on("mousemove", (event) => {
    const candidate = resolveProximity(event);
    if (!candidate) {
      if (lastProximityCandidate) {
        clearHighlight(); clearHoverPreview();
        lastProximityCandidate = null;
      }
      return;
    }
    if (candidate !== lastProximityCandidate) {
      onNodeHover(candidate);
      schedulePreview(event, candidate);
      lastProximityCandidate = candidate;
    }
    if (hoverPreviewVisible) positionHoverPreview(event.clientX, event.clientY);
  })
  .on("mouseleave", () => {
    clearHighlight(); clearHoverPreview();
    lastProximityCandidate = null;
  })
  .on("click", (event) => {
    const candidate = resolveProximity(event);
    if (!candidate) return;
    event.stopPropagation();
    onNodeClick(candidate);   // single-click: focus only (info panel + highlight), no zoom
  })
  .on("dblclick", (event) => {
    const candidate = resolveProximity(event);
    if (!candidate) return;
    event.stopPropagation();
    event.preventDefault();
    onNodeClick(candidate);
    zoomToSubtree(candidate); // double-click: commit and zoom in
  });

// Circles
nodes.append("circle")
  .attr("r", d => {
    if(d.depth===0) return 5;
    if(d.depth<=2) return 2;
    if(d.depth===3) return 1.8;
    if(d.depth===4) return 1.5;
    return d.data.photos ? 2.2 : 1.5;
  })
  .attr("fill", d => {
    if(d.depth===0) return '#181a1f';
    if(d.children) return '#0f1014';
    const st=d.data.status;
    if(st==='dead') return '#C62828';
    if(st==='gave') return '#7E57C2';
    return getColor(d);
  })
  .attr("stroke", d => getColor(d))
  .attr("stroke-width", d => {
    if(d.depth===0) return 1.5;
    if(d.children) return 0.8;
    return d.data.photos ? 1 : 0.4;
  });

// Replacement for removed #glow filter: outer ring around photo'd alive leaves
nodes.filter(d => !d.children && d.data.status==='alive' && d.data.photos && d.data.photos.length > 0)
  .insert("circle", ":first-child")
  .attr("class", "leaf-ring")
  .attr("r", d => (d.data.photos ? 2.2 : 1.5) + 1.5)
  .attr("fill", "none")
  .attr("stroke", d => getColor(d))
  .attr("stroke-opacity", 0.35)
  .attr("stroke-width", 1.5);

// Photo indicator (small diamond) for leaves with photos
nodes.filter(d => !d.children && d.data.photos && d.data.photos.length > 0)
  .append("text")
  .attr("class","has-photo-indicator")
  .attr("dy","-0.6em")
  .attr("x",0)
  .attr("text-anchor","middle")
  .attr("transform", d => d.x >= 180 ? "rotate(180)" : null)
  .text("\u25C6");

// Status icons
nodes.filter(d=>!d.children&&d.data.status==='dead')
  .append("text").attr("class","status-icon").attr("dy","0.35em")
  .attr("x",d=>(d.x>=180?1:-1)*2).attr("text-anchor","middle")
  .attr("transform",d=>d.x>=180?"rotate(180)":null)
  .style("font-size","10px").style("fill","#ef9a9a")
  .text("\u271D");

nodes.filter(d=>!d.children&&d.data.status==='gave')
  .append("text").attr("class","status-icon").attr("dy","0.35em")
  .attr("x",d=>(d.x>=180?1:-1)*2).attr("text-anchor","middle")
  .attr("transform",d=>d.x>=180?"rotate(180)":null)
  .style("font-size","10px").style("fill","#b39ddb")
  .text("\u1F381");

// ── Labels ──
// Branch labels with depth-based classes for progressive disclosure
nodes.filter(d=>d.children&&d.depth>=2)
  .append("text")
  .attr("class", d => {
    if(d.depth===2) return "branch-label branch-label-order";
    if(d.depth===3) return "branch-label branch-label-family";
    return "branch-label branch-label-genus";
  })
  .attr("dy","0.31em")
  .attr("x",d=>(d.x>=180?-1:1)*7)
  .attr("text-anchor",d=>d.x>=180?"end":"start")
  .attr("transform",d=>d.x>=180?"rotate(180)":null)
  .text(d=>d.data.name)
  .style("font-size",d=>d.depth===4?"14px":d.depth===3?"16px":"18px")
  .style("font-weight",d=>d.depth===4?"500":"300")
  .style("fill",d=>getColor(d))
  .style("font-family","'Inter', sans-serif");

// Leaf labels
nodes.filter(d=>!d.children)
  .append("text").attr("class","leaf-label").attr("dy","0.31em")
  .attr("x",d=>(d.x>=180?-1:1)*9)
  .attr("text-anchor",d=>d.x>=180?"end":"start")
  .attr("transform",d=>d.x>=180?"rotate(180)":null)
  .text(d => {
    const n=d.data.name;
    const st=d.data.status;
    const icon = st==='dead'?' \u271D':st==='gave'?' \u1F381':'';
    const photo = d.data.photos ? ' \u25C6':'';
    const label = n.length>28 ? n.substring(0,25)+'...' : n;
    return label + icon + photo;
  })
  .style("font-size","11px")
  .style("font-style","italic")
  .style("font-family","'Crimson Pro', Georgia, serif")
  .style("fill", d => {
    if(d.data.status==='dead') return '#d08888';
    if(d.data.status==='gave') return '#a088cc';
    return '#aaa';
  })
  .style("text-decoration",d=>d.data.status==='dead'?"line-through":"none");

// ── Label repulsion for crowded areas ──
(function repelLabels() {
  const items = [];
  g.selectAll('.branch-label').each(function(d) {
    const fs = d.depth === 4 ? 14 : d.depth === 3 ? 16 : 18;
    items.push({ el: this, d, angle: d.x, r: d.y, fs, dy: 0 });
  });
  g.selectAll('.leaf-label').each(function(d) {
    items.push({ el: this, d, angle: d.x, r: d.y, fs: 11, dy: 0 });
  });
  if (items.length < 2) return;
  items.sort((a, b) => a.angle - b.angle);

  for (let iter = 0; iter < 30; iter++) {
    let moved = false;
    for (let i = 0; i < items.length - 1; i++) {
      for (let j = i + 1; j < Math.min(i + 8, items.length); j++) {
        const a = items[i], b = items[j];
        if (Math.abs(a.r - b.r) > 50) continue;
        const avgR = (a.r + b.r) / 2;
        const effA = a.angle + a.dy / avgR * 180 / Math.PI;
        const effB = b.angle + b.dy / avgR * 180 / Math.PI;
        const sepDeg = effB - effA;
        if (sepDeg > 3) break;
        const sepPx = avgR * sepDeg * Math.PI / 180;
        const minPx = Math.max(a.fs, b.fs) * 1.3;
        if (sepPx < minPx) {
          const push = (minPx - sepPx) / 2;
          a.dy -= push;
          b.dy += push;
          moved = true;
        }
      }
    }
    // Wraparound: last ↔ first
    if (items.length > 1) {
      const a = items[items.length - 1], b = items[0];
      if (Math.abs(a.r - b.r) <= 50) {
        const avgR = (a.r + b.r) / 2;
        const effA = a.angle + a.dy / avgR * 180 / Math.PI;
        const effB = b.angle + b.dy / avgR * 180 / Math.PI + 360;
        const sepDeg = effB - effA;
        const sepPx = avgR * sepDeg * Math.PI / 180;
        const minPx = Math.max(a.fs, b.fs) * 1.3;
        if (sepPx < minPx) {
          const push = (minPx - sepPx) / 2;
          a.dy -= push;
          b.dy += push;
          moved = true;
        }
      }
    }
    if (!moved) break;
  }

  items.forEach(item => {
    if (Math.abs(item.dy) < 0.3) return;
    const rot = item.d.x >= 180 ? ' rotate(180)' : '';
    d3.select(item.el).attr('transform', `translate(0,${item.dy})${rot}`);
  });
})();

// ── Clade arcs ──
const cladeArcs = g.append("g").attr("class","clade-arcs");
root.children && root.children.forEach(clade => {
  const leaves = clade.leaves();
  if(!leaves.length) return;
  const minAngle = Math.min(...leaves.map(l=>l.x));
  const maxAngle = Math.max(...leaves.map(l=>l.x));
  const midAngle = (minAngle+maxAngle)/2;
  // Place arc beyond the leaf labels so it frames rather than crosses them
  const arcRadius = radius + 130;
  const arcG = cladeArcs.append("g");

  const startA = (minAngle-1.5-90)*Math.PI/180;
  const endA = (maxAngle+1.5-90)*Math.PI/180;
  const arc = d3.arc().innerRadius(arcRadius-0.5).outerRadius(arcRadius+0.5)
    .startAngle(startA+Math.PI/2).endAngle(endA+Math.PI/2);

  arcG.append("path").attr("d",arc())
    .attr("fill",cladeColors[clade.data.name]||'#555').attr("opacity",0.15);

  const labelAngle = midAngle-90;
  const [lx,ly] = [
    (arcRadius+20)*Math.cos(labelAngle*Math.PI/180),
    (arcRadius+20)*Math.sin(labelAngle*Math.PI/180)
  ];

  arcG.append("text").attr("x",lx).attr("y",ly)
    .attr("text-anchor","middle").attr("dominant-baseline","central")
    .attr("transform",`rotate(${labelAngle+(midAngle>180?-90:90)},${lx},${ly})`)
    .style("font-size","16px").style("font-weight","300")
    .style("letter-spacing","2px").style("text-transform","uppercase")
    .style("fill",cladeColors[clade.data.name]||'#555')
    .style("opacity",0.8)
    .style("font-family","'Inter', sans-serif")
    .text(clade.data.name);
});

// ── INTERACTIONS ──
function onNodeHover(d) {
  if(focusedNode) return;
  const anc=new Set(getAncestors(d));
  const desc=new Set(getDescendants(d));
  const related=new Set([...anc,...desc]);
  nodes.classed("dimmed",n=>!related.has(n)).classed("highlighted",n=>related.has(n));
  nodes.classed("show-label",n=>related.has(n));
  links.classed("dimmed",l=>!related.has(l.source)||!related.has(l.target))
       .classed("highlighted",l=>related.has(l.source)&&related.has(l.target));
}

function clearHighlight() {
  if(focusedNode) return;
  nodes.classed("dimmed",false).classed("highlighted",false).classed("show-label",false);
  links.classed("dimmed",false).classed("highlighted",false);
  applyStatusFilter();
}

function onNodeClick(d) {
  clearHoverPreview();
  if(d.depth===0){resetFocus();return;}
  focusedNode=d;
  const anc=new Set(getAncestors(d));
  const desc=new Set(getDescendants(d));
  const related=new Set([...anc,...desc]);
  nodes.classed("dimmed",n=>!related.has(n)).classed("highlighted",n=>related.has(n));
  nodes.classed("show-label",n=>related.has(n));
  links.classed("dimmed",l=>!related.has(l.source)||!related.has(l.target))
       .classed("highlighted",l=>related.has(l.source)&&related.has(l.target));

  const descs=getDescendants(d);
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  descs.forEach(n=>{
    const[px,py]=radialPoint(n.x,n.y);
    minX=Math.min(minX,px);maxX=Math.max(maxX,px);
    minY=Math.min(minY,py);maxY=Math.max(maxY,py);
  });
  const cx=(minX+maxX)/2,cy=(minY+maxY)/2;
  const span=Math.max(maxX-minX,maxY-minY,80);
  // Deeper nodes zoom in more: leaves get very close
  const minScale = d.children ? 0.5 : 4;
  const maxScale = d.children ? 8 : 12;
  const padding = d.children ? 180 : 60;
  const scale=Math.min(Math.max(Math.min(width,height)/(span+padding),minScale),maxScale);
  svg.transition().duration(750).ease(d3.easeCubicInOut)
    .call(zoomBehavior.transform,d3.zoomIdentity.translate(-cx*scale,-cy*scale).scale(scale));

  showInfo(d);
  updateBreadcrumb(d);
}

function resetFocus() {
  clearHoverPreview();
  focusedNode=null;
  nodes.classed("dimmed",false).classed("highlighted",false).classed("show-label",false);
  links.classed("dimmed",false).classed("highlighted",false);
  svg.transition().duration(750).ease(d3.easeCubicInOut)
    .call(zoomBehavior.transform, initialFitTransform || d3.zoomIdentity);
  closeInfo(); d3.select("#breadcrumb").html('');
  applyStatusFilter();
}

// Zoom the view to fit the subtree rooted at `d` (its descendant leaves' bbox).
// Leaves use radialPoint(x, y). A minimum span prevents near-zero bboxes from
// producing runaway scale factors.
function zoomToSubtree(d) {
  const descs = getDescendants(d).filter(n => !n.children);
  const points = (descs.length > 0 ? descs : [d]).map(n => radialPoint(n.x, n.y));
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const [px, py] of points) {
    if (px < minX) minX = px;
    if (px > maxX) maxX = px;
    if (py < minY) minY = py;
    if (py > maxY) maxY = py;
  }
  const MIN_SPAN = 300;                    // larger floor → gentler max-zoom
  const padding = 80;
  const spanX = Math.max(maxX - minX + padding * 2, MIN_SPAN);
  const spanY = Math.max(maxY - minY + padding * 2, MIN_SPAN);
  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  const scale = Math.min(width / spanX, height / spanY, 4);   // cap at 4x (was 14)
  const transform = d3.zoomIdentity.translate(-cx * scale, -cy * scale).scale(scale);
  svg.transition().duration(750).ease(d3.easeCubicInOut)
    .call(zoomBehavior.transform, transform);
}

// ── Fit-to-viewport ──
// The radial tree extends well beyond the viewport (content diameter > window
// height). Compute the actual rendered bbox and apply a zoom transform so the
// whole diagram fits on first load, on reset, and after window resize.
function fitToViewport(animate) {
  // Use nodeGroup (circles + labels) for the bbox, not g — g contains the
  // proximity overlay rect which is deliberately oversized and would dominate.
  const bbox = nodeGroup.node().getBBox();
  if (!bbox.width || !bbox.height) return;
  const cx = bbox.x + bbox.width / 2;
  const cy = bbox.y + bbox.height / 2;
  const margin = 12;
  const scale = Math.min(
    (width  - margin * 2) / bbox.width,
    (height - margin * 2) / bbox.height
  );
  const transform = d3.zoomIdentity.translate(-cx * scale, -cy * scale).scale(scale);
  initialFitTransform = transform;
  if (animate) {
    svg.transition().duration(600).ease(d3.easeCubicInOut)
      .call(zoomBehavior.transform, transform);
  } else {
    svg.call(zoomBehavior.transform, transform);
  }
}

// Run fit once after fonts load (so text bboxes are correct), then again on
// resize. Fonts.ready resolves immediately if fonts are already loaded.
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(() => fitToViewport(false));
} else {
  fitToViewport(false);
}

window.addEventListener('resize', () => {
  width  = window.innerWidth;
  height = window.innerHeight;
  svg.attr("width", width).attr("height", height);
  if (!focusedNode) fitToViewport(false);
});

function showInfo(d) {
  const rank=rankName(d.depth);
  document.getElementById('info-rank').textContent=rank;
  const taxon=document.getElementById('info-taxon');
  const photoSection=document.getElementById('info-photos');

  if(!d.children) {
    const genus=d.parent?d.parent.data.name:'';
    const st=d.data.status;
    const stLabel=st==='dead'?' \u271D':st==='gave'?' \u1F381':'';
    taxon.innerHTML=`<i>${genus} ${d.data.name}</i>${stLabel}`;
    const vendor=d.data.vendor||'';
    let details='';
    if(vendor) details+=`<div class="detail"><b>Source:</b> ${vendor}</div>`;
    details+=`<div class="detail"><b>Status:</b> ${st==='dead'?'Deceased \u271D':st==='gave'?'Gave away \u1F381':'Alive'}</div>`;
    document.getElementById('info-details').innerHTML=details;
    document.getElementById('info-children').innerHTML='';

    // Show photos if available
    if(d.data.photos && d.data.photos.length>0) {
      startSlideshow(d.data.photos, `${genus} ${d.data.name}`);
      photoSection.style.display='block';
    } else {
      stopSlideshow();
      photoSection.style.display='none';
    }
  } else {
    taxon.textContent=d.data.name;
    const total=leafCount(d);
    const aliveCount=getDescendants(d).filter(n=>!n.children&&n.data.status==='alive').length;
    const deadCount=getDescendants(d).filter(n=>!n.children&&n.data.status==='dead').length;
    const gaveCount=getDescendants(d).filter(n=>!n.children&&n.data.status==='gave').length;
    const photoCount=getDescendants(d).filter(n=>!n.children&&n.data.photos&&n.data.photos.length>0).length;
    let html=`<div class="detail"><b>Total accessions:</b> ${total}</div>`;
    html+=`<div class="detail" style="color:#66BB6A"><b>Alive:</b> ${aliveCount}</div>`;
    if(deadCount) html+=`<div class="detail" style="color:#ef9a9a"><b>Dead:</b> ${deadCount}</div>`;
    if(gaveCount) html+=`<div class="detail" style="color:#b39ddb"><b>Gave away:</b> ${gaveCount}</div>`;
    if(photoCount) html+=`<div class="detail" style="color:#FFD54F"><b>With photos:</b> ${photoCount}</div>`;
    document.getElementById('info-details').innerHTML=html;
    stopSlideshow();
    photoSection.style.display='none';

    if(d.children) {
      const listHtml=d.children.map(c=>{
        const n=leafCount(c);
        const hasPhotos=getDescendants(c).some(x=>!x.children&&x.data.photos&&x.data.photos.length>0);
        const photoIcon=hasPhotos?' <span style="color:#FFD54F">\u25C6</span>':'';
        const label=c.children?`${c.data.name} (${n})${photoIcon}`:
          `<i>${c.data.name}</i>${c.data.status==='dead'?' \u271D':c.data.status==='gave'?' \u1F381':''}${c.data.photos?' <span style="color:#FFD54F">\u25C6</span>':''}`;
        return `<div class="child" data-name="${c.data.name}">${label}</div>`;
      }).join('');
      document.getElementById('info-children').innerHTML=listHtml;
      document.querySelectorAll('#info-children .child').forEach(el=>{
        el.addEventListener('click',()=>{
          const target=d.children.find(c=>c.data.name===el.dataset.name);
          if(target) onNodeClick(target);
        });
      });
    }
  }
  taxon.style.color=getColor(d);
  document.getElementById('info').style.display='block';
}

function closeInfo() {
  document.getElementById('info').style.display='none';
  document.getElementById('info-photos').style.display='none';
  stopSlideshow();
}

// ── SLIDESHOW ──
let slidePhotos = [];
let slideIndex = 0;
let slideTimer = null;

function startSlideshow(photos, alt) {
  stopSlideshow();
  slidePhotos = photos;
  slideIndex = 0;
  const container = document.getElementById('slideshow');
  const dots = document.getElementById('slide-dots');
  container.innerHTML = photos.map((p, i) =>
    `<img src="${p}" alt="${alt}" class="${i > 0 ? 'slide-hidden' : ''}" onerror="this.style.display='none'" />`
  ).join('');
  container.onclick = () => openLightbox(slideIndex);
  dots.innerHTML = photos.length > 1 ? photos.map((_, i) =>
    `<div class="slide-dot${i === 0 ? ' active' : ''}" onclick="event.stopPropagation();goToSlide(${i})"></div>`
  ).join('') : '';
  if (photos.length > 1) {
    slideTimer = setInterval(() => goToSlide((slideIndex + 1) % slidePhotos.length), 5000);
  }
}

function goToSlide(i) {
  slideIndex = i;
  const imgs = document.querySelectorAll('#slideshow img');
  imgs.forEach((img, j) => img.classList.toggle('slide-hidden', j !== i));
  document.querySelectorAll('.slide-dot').forEach((d, j) => d.classList.toggle('active', j === i));
  // Reset timer
  if (slideTimer) { clearInterval(slideTimer); slideTimer = setInterval(() => goToSlide((slideIndex + 1) % slidePhotos.length), 5000); }
}

function stopSlideshow() {
  if (slideTimer) { clearInterval(slideTimer); slideTimer = null; }
  slidePhotos = []; slideIndex = 0;
}

// ── LIGHTBOX ──
let lbPhotos = [];
let lbIndex = 0;

function openLightbox(idx) {
  lbPhotos = slidePhotos;
  lbIndex = typeof idx === 'number' ? idx : 0;
  showLbPhoto();
  document.getElementById('lightbox').style.display = 'flex';
}

function showLbPhoto() {
  document.getElementById('lightbox-img').src = lbPhotos[lbIndex];
  const counter = document.getElementById('lb-counter');
  counter.textContent = lbPhotos.length > 1 ? `${lbIndex + 1} / ${lbPhotos.length}` : '';
  document.querySelector('.lb-prev').style.display = lbPhotos.length > 1 ? '' : 'none';
  document.querySelector('.lb-next').style.display = lbPhotos.length > 1 ? '' : 'none';
}

function lbNav(dir, e) {
  if(e) e.stopPropagation();
  lbIndex = (lbIndex + dir + lbPhotos.length) % lbPhotos.length;
  showLbPhoto();
}

function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
}

function updateBreadcrumb(d) {
  const path=getAncestors(d).reverse();
  const bc=d3.select("#breadcrumb"); bc.html('');
  path.forEach((node,i)=>{
    if(i>0) bc.append("span").attr("class","sep").text(" \u203A ");
    bc.append("span")
      .text(node.depth===0?"All":node.data.name)
      .style("color",i===path.length-1?getColor(node):'#555')
      .on("click",()=>node.depth===0?resetFocus():onNodeClick(node));
  });
}

// ── STATUS FILTER ──
function applyStatusFilter() {}

// ── SEARCH ──
const searchInput=document.getElementById('search');
const searchCount=document.getElementById('search-count');
searchInput.addEventListener('input',()=>{
  searchTerm=searchInput.value.trim().toLowerCase();
  if(!searchTerm){
    searchCount.textContent='';
    if(!focusedNode) clearHighlight();
    return;
  }
  const matches=root.leaves().filter(d=>{
    const full=(d.parent?d.parent.data.name+' ':'')+d.data.name;
    return full.toLowerCase().includes(searchTerm)||(d.data.vendor||'').toLowerCase().includes(searchTerm);
  });
  searchCount.textContent=`${matches.length} found`;
  if(!matches.length){
    nodes.classed("dimmed",true).classed("highlighted",false);
    links.classed("dimmed",true).classed("highlighted",false);
    return;
  }
  const related=new Set();
  matches.forEach(m=>getAncestors(m).forEach(a=>related.add(a)));
  nodes.classed("dimmed",n=>!related.has(n)).classed("highlighted",n=>matches.includes(n))
       .classed("show-label",n=>matches.includes(n));
  links.classed("dimmed",l=>!related.has(l.source)||!related.has(l.target))
       .classed("highlighted",l=>related.has(l.source)&&related.has(l.target));
  if(matches.length===1){
    focusedNode=matches[0]; showInfo(matches[0]); updateBreadcrumb(matches[0]);
    const[px,py]=radialPoint(matches[0].x,matches[0].y);
    svg.transition().duration(750).ease(d3.easeCubicInOut)
      .call(zoomBehavior.transform,d3.zoomIdentity.translate(-px*6,-py*6).scale(6));
  }
});

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(document.getElementById('lightbox').style.display==='flex') { closeLightbox(); return; }
    searchInput.value=''; searchTerm=''; searchCount.textContent='';
    resetFocus();
  }
  if(document.getElementById('lightbox').style.display==='flex') {
    if(e.key==='ArrowLeft') lbNav(-1);
    if(e.key==='ArrowRight') lbNav(1);
  }
});

svg.on("click",()=>{ if(focusedNode) resetFocus(); });

// ── LEGEND ──
const cladeCounts={};
root.leaves().forEach(d=>{ const c=getClade(d); cladeCounts[c]=(cladeCounts[c]||0)+1; });
const cladeOrder=["Algae","Bryophytes","Ferns","Gymnosperms","Basal Angiosperms","Monocots","Eudicots"];
const legendItems=d3.select("#legend-items");
cladeOrder.forEach(clade=>{
  const count=cladeCounts[clade];
  if(!count) return;
  const color=cladeColors[clade]||'#555';
  const item=legendItems.append("div").attr("class","legend-item").attr("data-clade",clade)
    .on("click",()=>{
      const cladeNode=root.children.find(c=>c.data.name===clade);
      if(cladeNode) onNodeClick(cladeNode);
    });
  item.append("div").attr("class","legend-swatch").style("background",color);
  item.append("span").text(`${clade} (${count})`);
});
</script>
