<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Highland Cloud Forest">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#12141a"/>
      <stop offset="100%" stop-color="#050607"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d3a2ef"/>
      <stop offset="100%" stop-color="#b06dd1"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <g transform="translate(32 32)" stroke="url(#leaf)" stroke-width="2" stroke-linecap="round" fill="none">
    <!-- radial dendrogram motif: hub + 6 branches with leaf dots -->
    <circle r="2.2" fill="#b06dd1" stroke="none"/>
    <g>
      <line x1="0" y1="0" x2="0" y2="-16"/>
      <line x1="0" y1="0" x2="14" y2="-8"/>
      <line x1="0" y1="0" x2="14" y2="8"/>
      <line x1="0" y1="0" x2="0" y2="16"/>
      <line x1="0" y1="0" x2="-14" y2="8"/>
      <line x1="0" y1="0" x2="-14" y2="-8"/>
    </g>
    <g fill="#f4cf5c" stroke="none">
      <circle cx="0" cy="-16" r="1.8"/>
      <circle cx="14" cy="-8" r="1.8"/>
      <circle cx="14" cy="8" r="1.8"/>
      <circle cx="0" cy="16" r="1.8"/>
      <circle cx="-14" cy="8" r="1.8"/>
      <circle cx="-14" cy="-8" r="1.8"/>
    </g>
  </g>
</svg>
